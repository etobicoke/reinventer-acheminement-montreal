name: shadow-run
on:
  schedule:
    - cron: "17 11 * * *"   # ~07:17 America/Toronto, after the City's feed refreshes
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: shadow-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run the shadow-run (pulls the live City API, regenerates the scorecard)
        run: node shadow/shadow-run.mjs
      - name: Commit the day's ledger entry
        run: |
          git config user.name "shadow-run[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shadow/predictions shadow/scorecard.json shadow/scorecard.html shadow/scorecard.en.html shadow/index.html shadow/policy.json
          if git diff --cached --quiet; then echo "No change today."; else
            git commit -m "chore(shadow): routing ledger $(date -u +%F)"; git push; fi
